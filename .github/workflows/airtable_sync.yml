name: Airtable to JSON

on:
  schedule:
    - cron: '0 15 * * *'   # 매일 자정(KST) 실행 = UTC 15:00
  workflow_dispatch:       # GitHub에서 수동 실행 버튼

# 봇이 레포지토리에 커밋/푸시를 할 수 있도록 쓰기 권한 부여
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      # 기존에 중복되었던 체크아웃 옵션을 하나로 통합
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0  # 전체 히스토리 가져오기 (선택)

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 패키지 설치
        run: pip install requests

      - name: Airtable → kugak.json 변환
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
        run: python airtable_to_json.py

      - name: 변경사항 커밋 · 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kugak.json
          git diff --cached --quiet || git commit -m "kugak.json 자동 업데이트 ($(date '+%Y-%m-%d %H:%M KST'))"
          git push
