name: Airtable to JSON

on:
  schedule:
    - cron: '0 15 * * *'   # 매일 자정(KST) 실행 = UTC 15:00
  workflow_dispatch:         # GitHub에서 수동 실행 버튼

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install requests

      - name: Airtable → kugak.json 변환
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
        run: python airtable_to_json.py

      - name: 변경사항 커밋 · 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kugak.json
          git diff --cached --quiet || git commit -m "kugak.json 자동 업데이트 ($(date '+%Y-%m-%d %H:%M KST'))"
          git push
