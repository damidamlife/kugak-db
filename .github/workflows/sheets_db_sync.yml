name: Google Sheets to JSON + SQLite

on:
  schedule:
    - cron: '0 15 * * *'   # 매일 자정(KST) = UTC 15:00
  workflow_dispatch:         # 수동 실행 버튼

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # 파일 푸시 권한

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 패키지 설치
        run: pip install requests

      - name: Google Sheets → JSON + SQLite 변환
        env:
          SHEETS_CSV_URL: ${{ secrets.SHEETS_CSV_URL }}
        run: python sheets_to_db.py

      - name: 변경사항 커밋 · 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kugak.json kugak.db
          git diff --cached --quiet || git commit -m "자동 업데이트 $(date '+%Y-%m-%d %H:%M KST')"
          git push
