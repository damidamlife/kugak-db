name: Google Sheets to JSON

on:
  schedule:
    - cron: '0 15 * * *'   # 매일 자정(KST) 실행 = UTC 15:00
  workflow_dispatch:         # GitHub에서 수동 실행 버튼

# 봇이 레포지토리에 커밋/푸시를 할 수 있도록 쓰기 권한 부여
permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # Node.js 24 경고 해결

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 패키지 설치
        run: pip install requests

      - name: Google Sheets → kugak.json 변환
        env:
          SHEETS_CSV_URL: ${{ secrets.SHEETS_CSV_URL }}
        run: python sheets_to_json.py

      - name: 변경사항 커밋 · 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kugak.json
          git diff --cached --quiet || git commit -m "kugak.json 자동 업데이트 ($(date '+%Y-%m-%d %H:%M KST'))"
          git push
