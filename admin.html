<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>국악 DB · 편집기</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4f0;--surface:#fff;--border:#e5e4df;--border2:#d3d1c7;
  --text:#1a1a18;--muted:#888780;--hint:#b4b2a9;
  --blue:#185FA5;--blue-light:#e6f1fb;--blue-text:#0C447C;
  --teal:#1D9E75;--teal-light:#e1f5ee;--teal-text:#085041;
  --amber:#BA7517;--amber-light:#faeeda;--amber-text:#633806;
  --red:#A32D2D;--red-light:#fcebeb;--red-text:#791F1F;
  --gray:#f1efe8;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;
  background:var(--bg);color:var(--text);font-size:14px;line-height:1.6}

.header{background:var(--surface);border-bottom:1px solid var(--border);
  padding:13px 28px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100}
.header h1{font-size:16px;font-weight:600}
.header-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.btn{padding:7px 14px;border-radius:7px;font-size:13px;cursor:pointer;
  border:1px solid var(--border2);background:var(--surface);color:var(--text);
  font-family:inherit;transition:all .12s}
.btn:hover{background:var(--gray)}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-primary:hover{background:#0C447C}
.btn-teal{background:var(--teal);color:#fff;border-color:var(--teal)}
.btn-teal:hover{background:#085041}
.btn-amber{background:var(--amber-light);color:var(--amber-text);border-color:var(--amber-light)}
.btn-amber:hover{background:#FAC775}
.chip{padding:4px 10px;border-radius:6px;font-size:12px;font-weight:500}
.chip-amber{background:var(--amber-light);color:var(--amber-text)}

#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:60vh;gap:12px;color:var(--muted)}
.spinner{width:28px;height:28px;border:3px solid var(--border);
  border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

#app{display:none;padding:20px 28px 48px}

.notice{background:var(--amber-light);color:var(--amber-text);border-radius:8px;
  padding:10px 14px;font-size:12px;margin-bottom:14px;display:none}
.notice.show{display:flex;align-items:center;gap:8px}

.statusbar{display:flex;align-items:center;justify-content:space-between;
  margin-bottom:12px;flex-wrap:wrap;gap:8px}
.stat-chips{display:flex;gap:8px;flex-wrap:wrap}

.toolbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.toolbar input,.toolbar select{padding:7px 11px;font-size:13px;
  border:1px solid var(--border2);border-radius:7px;background:var(--surface);
  color:var(--text);outline:none}
.toolbar input{flex:2;min-width:180px}
.toolbar input:focus,.toolbar select:focus{border-color:var(--blue)}
.toolbar select{flex:1;min-width:110px}

.table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:10px;margin-bottom:12px}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--gray);padding:8px 10px;text-align:left;font-weight:500;
  font-size:11px;color:var(--muted);border-bottom:1px solid var(--border);
  white-space:nowrap;cursor:pointer;user-select:none}
th:hover{background:var(--border)}
th .sa{font-size:9px;opacity:.35;margin-left:2px}
th.sorted .sa{opacity:1;color:var(--blue)}
td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.modified td{background:#fffbea}
tr.added td{background:#f0fdf8}
tr.deleted td{background:#fff0f0;opacity:.55}
tr:hover:not(.deleted) td{background:var(--gray)}
.badge{display:inline-block;padding:2px 6px;border-radius:4px;font-size:11px;font-weight:500}
.b-vocal{background:var(--teal-light);color:var(--teal-text)}
.b-instr{background:var(--blue-light);color:var(--blue-text)}
.b-drama{background:var(--amber-light);color:var(--amber-text)}
.b-etc{background:var(--gray);color:var(--muted)}
.action-btns{display:flex;gap:4px}
.icon-btn{padding:3px 8px;border-radius:5px;font-size:11px;cursor:pointer;
  border:1px solid var(--border2);background:var(--surface);color:var(--muted);transition:all .1s}
.icon-btn:hover{background:var(--gray)}
.icon-btn.del:hover{background:var(--red-light);color:var(--red-text);border-color:var(--red-light)}
.icon-btn.restore:hover{background:var(--teal-light);color:var(--teal-text)}
.title-cell{max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}

.pagination{display:flex;gap:6px;align-items:center;justify-content:center}
.page-btn{padding:4px 12px;border:1px solid var(--border2);border-radius:6px;
  background:var(--surface);color:var(--text);cursor:pointer;font-size:12px}
.page-btn:disabled{opacity:.3;cursor:default}
.page-btn:not(:disabled):hover{background:var(--gray)}
.page-info{color:var(--muted);font-size:12px;min-width:70px;text-align:center}

/* 모달 */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);
  z-index:500;overflow-y:auto;padding:32px 16px}
.modal-overlay.open{display:block}
.modal-inner{max-width:640px;margin:0 auto}
.modal{background:var(--surface);border-radius:12px;padding:24px}
.modal h2{font-size:15px;font-weight:600;margin-bottom:16px}
.field-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px}
.field{display:flex;flex-direction:column;gap:4px}
.field.full{grid-column:1/-1}
.field label{font-size:11px;font-weight:500;color:var(--muted);
  text-transform:uppercase;letter-spacing:.04em}
.field input,.field select,.field textarea{padding:8px 10px;font-size:13px;
  border:1px solid var(--border2);border-radius:7px;background:var(--surface);
  color:var(--text);outline:none;font-family:inherit}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--blue)}
.field textarea{resize:vertical;min-height:70px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;
  margin-top:16px;border-top:1px solid var(--border);padding-top:14px}
.modal-section{font-size:11px;font-weight:500;color:var(--muted);
  text-transform:uppercase;letter-spacing:.05em;
  margin:14px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--border);
  grid-column:1/-1}

.toast{position:fixed;bottom:22px;right:22px;background:var(--text);
  color:var(--surface);padding:10px 16px;border-radius:8px;font-size:13px;
  z-index:999;opacity:0;transform:translateY(6px);transition:all .18s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
</style>
</head>
<body>

<div class="header">
  <h1>국악 DB 편집기</h1>
  <div class="header-right">
    <span id="unsavedBadge" style="display:none" class="chip chip-amber">미저장 변경사항</span>
    <button class="btn" onclick="document.getElementById('fileInput').click()">JSON 불러오기</button>
    <input type="file" id="fileInput" accept=".json" style="display:none" onchange="loadFile(this)">
    <button class="btn btn-primary" onclick="openAddModal()">+ 작품 추가</button>
    <button class="btn btn-teal" onclick="downloadJSON()">JSON 다운로드</button>
  </div>
</div>

<div id="loading">
  <div class="spinner"></div>
  <p>kugak.json 불러오는 중...</p>
  <p style="font-size:12px;color:var(--hint);margin-top:4px">파일이 없으면 오른쪽 위 "JSON 불러오기"를 사용하세요</p>
</div>

<div id="app">
  <div class="notice" id="notice">
    <span>⚠</span>
    <span>변경사항이 있습니다. <strong>JSON 다운로드</strong> 후 GitHub의 kugak.json을 교체하세요.</span>
  </div>

  <div class="statusbar">
    <div class="stat-chips">
      <span class="chip" style="background:var(--blue-light);color:var(--blue-text)" id="statTotal">전체 0곡</span>
      <span class="chip" style="background:var(--gray);color:var(--muted)" id="statShown">표시 0곡</span>
      <span class="chip chip-amber" id="statMod" style="display:none"></span>
      <span class="chip" style="background:var(--red-light);color:var(--red-text);display:none" id="statDel"></span>
    </div>
    <button class="btn btn-amber" id="undoBtn" style="display:none" onclick="undoAll()">전체 되돌리기</button>
  </div>

  <div class="toolbar">
    <input type="text" id="q" placeholder="제목, 작곡가, 공연명, 해설 검색..." oninput="doFilter()">
    <select id="fGenre" onchange="doFilter()">
      <option value="">전체 장르</option>
      <option value="기악">기악</option>
      <option value="성악">성악</option>
      <option value="극음악">극음악</option>
    </select>
    <select id="fForm" onchange="doFilter()"><option value="">전체 형식</option></select>
    <select id="fState" onchange="doFilter()">
      <option value="">전체 상태</option>
      <option value="modified">수정된 항목</option>
      <option value="added">추가된 항목</option>
      <option value="deleted">삭제된 항목</option>
      <option value="has_cm">해설 있음</option>
      <option value="no_cm">해설 없음</option>
    </select>
  </div>

  <div class="table-wrap">
    <table>
      <thead><tr>
        <th onclick="sortBy('t')" id="th-t">제목 <span class="sa">↕</span></th>
        <th onclick="sortBy('f1')" id="th-f1">장르 <span class="sa">↕</span></th>
        <th onclick="sortBy('f2')" id="th-f2">형식 <span class="sa">↕</span></th>
        <th onclick="sortBy('c')" id="th-c">작곡가 <span class="sa">↕</span></th>
        <th onclick="sortBy('d')" id="th-d" class="sorted">공연일 <span class="sa">↑</span></th>
        <th>해설</th>
        <th style="width:100px">작업</th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
  <div class="pagination">
    <button class="page-btn" id="prevBtn" onclick="changePage(-1)">← 이전</button>
    <span class="page-info" id="pageInfo"></span>
    <button class="page-btn" id="nextBtn" onclick="changePage(1)">다음 →</button>
  </div>
</div>

<!-- 편집 모달 -->
<div class="modal-overlay" id="modal" onclick="handleBg(event)">
  <div class="modal-inner">
    <div class="modal">
      <h2 id="modalTitle">작품 편집</h2>
      <div class="field-grid">
        <div class="modal-section">작품 정보</div>
        <div class="field full"><label>제목</label><input id="f-t" placeholder="작품 제목 *"></div>
        <div class="field">
          <label>장르 (form1)</label>
          <select id="f-f1">
            <option value="">선택</option>
            <option value="기악">기악</option>
            <option value="성악">성악</option>
            <option value="극음악">극음악</option>
          </select>
        </div>
        <div class="field"><label>형식 (form2)</label><input id="f-f2" placeholder="합주, 독주, 관현악..."></div>
        <div class="field"><label>악기·분류 (form3)</label><input id="f-f3" placeholder="가야금, 피리..."></div>
        <div class="field"><label>작곡가</label><input id="f-c" placeholder="작곡가명"></div>
        <div class="field"><label>편곡</label><input id="f-ar" placeholder="편곡자명"></div>
        <div class="field"><label>작사</label><input id="f-ly" placeholder="작사자명"></div>
        <div class="field"><label>구성</label><input id="f-cs" placeholder="악장 구성 등"></div>

        <div class="modal-section">공연 정보</div>
        <div class="field"><label>공연일</label><input id="f-d" placeholder="1995.10.15"></div>
        <div class="field"><label>공연 장소</label><input id="f-p" placeholder="국립국악원 예악당"></div>
        <div class="field full"><label>공연명</label><input id="f-n" placeholder="제00회 정기연주회..."></div>
        <div class="field full"><label>연주자</label><textarea id="f-pp" rows="2" placeholder="악기:연주자, ..."></textarea></div>

        <div class="modal-section">해설·비고</div>
        <div class="field full"><label>작품 해설 (commentary)</label><textarea id="f-cm" rows="4" placeholder="작품 해설 내용..."></textarea></div>
        <div class="field full"><label>비고 (note)</label><textarea id="f-nt" rows="2" placeholder="비고 내용..."></textarea></div>
        <div class="field full"><label>보충 해설 (note_02)</label><textarea id="f-n2" rows="3" placeholder="보충 해설 내용..."></textarea></div>
        <div class="field full"><label>추가 정보 (add_note)</label><textarea id="f-an" rows="2" placeholder="추가 정보..."></textarea></div>
      </div>
      <div class="modal-actions">
        <button class="btn" onclick="closeModal()">취소</button>
        <button class="btn btn-primary" onclick="saveModal()">저장</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const FKEYS = ['t','f1','f2','f3','c','ar','ly','cs','d','n','p','pp','nt','cm','an','n2'];

let WORKS=[], STATS={};
let displayed=[], currentPage=0;
const PAGE=50;
let sortKey='d', sortDir=1;
let modified=new Set(), deleted=new Set(), added=new Set(), originals={};

// ── 자동 로드 ──
async function autoLoad(){
  try{
    const res=await fetch('kugak.json');
    if(!res.ok)throw new Error();
    const data=await res.json();
    applyData(data);
  }catch{
    document.getElementById('loading').innerHTML=
      '<p style="color:var(--muted)">kugak.json 자동 로드 실패<br><small>오른쪽 위 <strong>JSON 불러오기</strong>를 사용하세요</small></p>';
  }
}

function loadFile(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{applyData(JSON.parse(e.target.result));toast('불러오기 완료: '+file.name);}
    catch{toast('JSON 파싱 실패');}
  };
  reader.readAsText(file);
}

function applyData(data){
  WORKS=data.works||[]; STATS=data.stats||{};
  modified.clear();deleted.clear();added.clear();originals={};
  const fSet=new Set(WORKS.map(w=>w.f2).filter(Boolean));
  const sel=document.getElementById('fForm');
  sel.innerHTML='<option value="">전체 형식</option>';
  [...fSet].sort().forEach(f=>{const o=document.createElement('option');o.value=f;o.textContent=f;sel.appendChild(o);});
  document.getElementById('loading').style.display='none';
  document.getElementById('app').style.display='block';
  doFilter(); updateStats();
}

// ── 필터·정렬 ──
function doFilter(){
  const q=(document.getElementById('q').value||'').toLowerCase();
  const g=document.getElementById('fGenre').value;
  const f=document.getElementById('fForm').value;
  const st=document.getElementById('fState').value;

  displayed=WORKS.map((w,i)=>({...w,_i:i})).filter(w=>{
    const i=w._i;
    if(st==='modified'&&!modified.has(i))return false;
    if(st==='added'&&!added.has(i))return false;
    if(st==='deleted'&&!deleted.has(i))return false;
    if(st==='has_cm'&&!w.cm)return false;
    if(st==='no_cm'&&w.cm)return false;
    if(g&&w.f1!==g)return false;
    if(f&&!(w.f2||'').includes(f))return false;
    if(q){const hay=(w.t+w.c+w.n+(w.f3||'')+(w.cm||'')+(w.nt||'')+(w.n2||'')).toLowerCase();if(!hay.includes(q))return false;}
    return true;
  });

  displayed.sort((a,b)=>{
    let va=a[sortKey]||'',vb=b[sortKey]||'';
    if(sortKey==='d'){
      const na=va.replace(/\D/g,'').padEnd(8,'0');
      const nb=vb.replace(/\D/g,'').padEnd(8,'0');
      return na<nb?-sortDir:na>nb?sortDir:0;
    }
    return va.localeCompare(vb,'ko')*sortDir;
  });

  currentPage=0; renderTable(); updateStats();
}

function sortBy(key){
  if(sortKey===key)sortDir*=-1;else{sortKey=key;sortDir=1;}
  document.querySelectorAll('th[id^="th-"]').forEach(th=>{th.classList.remove('sorted');th.querySelector('.sa').textContent='↕';});
  const th=document.getElementById('th-'+key);
  if(th){th.classList.add('sorted');th.querySelector('.sa').textContent=sortDir===1?'↑':'↓';}
  doFilter();
}

// ── 테이블 ──
function renderTable(){
  const total=displayed.length,start=currentPage*PAGE;
  const page=displayed.slice(start,start+PAGE);
  const tbody=document.getElementById('tbody');
  tbody.innerHTML='';
  if(!page.length){
    tbody.innerHTML='<tr><td colspan="7" style="text-align:center;padding:20px;color:var(--muted)">항목 없음</td></tr>';
  }else{
    page.forEach(w=>{
      const i=w._i;
      const isDel=deleted.has(i),isMod=modified.has(i),isAdd=added.has(i);
      const cls=isDel?'deleted':isAdd?'added':isMod?'modified':'';
      const bc=w.f1==='성악'?'b-vocal':w.f1==='극음악'?'b-drama':w.f1==='기악'?'b-instr':'b-etc';
      const hasCm=w.cm||w.nt||w.n2;
      tbody.innerHTML+=`<tr class="${cls}">
        <td class="title-cell" title="${esc(w.t)}">${esc(w.t)||'—'}</td>
        <td><span class="badge ${bc}">${esc(w.f1)||'—'}</span></td>
        <td style="white-space:nowrap;color:var(--muted)">${esc(w.f2)||'—'}</td>
        <td style="white-space:nowrap">${esc(w.c)||'—'}</td>
        <td style="white-space:nowrap;color:var(--muted)">${esc(w.d)||'—'}</td>
        <td style="font-size:11px;color:${hasCm?'var(--teal-text)':'var(--hint)'}">
          ${w.cm?'해설':''}${w.nt?(w.cm?' · ':'')+'비고':''}${w.n2?(w.cm||w.nt?' · ':'')+'note_02':''}
          ${!hasCm?'—':''}
        </td>
        <td><div class="action-btns">
          ${isDel
            ?`<button class="icon-btn restore" onclick="restoreWork(${i})">복원</button>`
            :`<button class="icon-btn" onclick="openEditModal(${i})">수정</button>
              <button class="icon-btn del" onclick="deleteWork(${i})">삭제</button>`
          }
        </div></td>
      </tr>`;
    });
  }
  const tp=Math.ceil(total/PAGE)||1;
  document.getElementById('pageInfo').textContent=`${currentPage+1} / ${tp}`;
  document.getElementById('prevBtn').disabled=currentPage===0;
  document.getElementById('nextBtn').disabled=currentPage>=tp-1;
  document.getElementById('statShown').textContent=`표시 ${total.toLocaleString()}곡`;
}

function changePage(d){
  const tp=Math.ceil(displayed.length/PAGE)||1;
  currentPage=Math.max(0,Math.min(tp-1,currentPage+d));
  renderTable();
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── 모달 ──
let editingIdx=null;

function openAddModal(){
  editingIdx=null;
  document.getElementById('modalTitle').textContent='작품 추가';
  FKEYS.forEach(k=>{const el=document.getElementById('f-'+k);if(el)el.value='';});
  document.getElementById('modal').classList.add('open');
}

function openEditModal(idx){
  editingIdx=idx;
  const w=WORKS[idx];
  document.getElementById('modalTitle').textContent='작품 수정';
  FKEYS.forEach(k=>{const el=document.getElementById('f-'+k);if(el)el.value=w[k]||'';});
  document.getElementById('modal').classList.add('open');
}

function closeModal(){document.getElementById('modal').classList.remove('open');editingIdx=null;}
function handleBg(e){if(e.target===document.getElementById('modal'))closeModal();}

function saveModal(){
  const vals={};
  FKEYS.forEach(k=>{const el=document.getElementById('f-'+k);if(el)vals[k]=el.value.trim();});
  if(!vals.t){toast('제목은 필수입니다');return;}

  if(editingIdx===null){
    WORKS.push(vals);
    added.add(WORKS.length-1);
    toast('작품 추가됨');
  }else{
    if(!originals[editingIdx])originals[editingIdx]={...WORKS[editingIdx]};
    WORKS[editingIdx]={...WORKS[editingIdx],...vals};
    if(!added.has(editingIdx))modified.add(editingIdx);
    toast('수정됨');
  }
  closeModal(); markUnsaved(); doFilter();
}

function deleteWork(idx){
  if(!confirm('이 작품을 삭제하시겠습니까?'))return;
  deleted.add(idx); markUnsaved(); doFilter(); toast('삭제 표시됨');
}

function restoreWork(idx){
  deleted.delete(idx); markUnsaved(); doFilter(); toast('복원됨');
}

function undoAll(){
  if(!confirm('모든 변경사항을 되돌리시겠습니까?'))return;
  Object.entries(originals).forEach(([i,o])=>WORKS[parseInt(i)]=o);
  [...added].sort((a,b)=>b-a).forEach(i=>WORKS.splice(i,1));
  modified.clear();deleted.clear();added.clear();originals={};
  document.getElementById('unsavedBadge').style.display='none';
  document.getElementById('undoBtn').style.display='none';
  document.getElementById('notice').classList.remove('show');
  doFilter(); toast('모든 변경사항 되돌림');
}

function updateStats(){
  document.getElementById('statTotal').textContent=`전체 ${WORKS.length.toLocaleString()}곡`;
  const mc=modified.size,dc=deleted.size,ac=added.size;
  const modEl=document.getElementById('statMod'),delEl=document.getElementById('statDel');
  modEl.style.display=(mc||ac)?'inline-block':'none';
  modEl.textContent=`수정+추가 ${mc+ac}건`;
  delEl.style.display=dc?'inline-block':'none';
  delEl.textContent=`삭제 ${dc}건`;
}

function markUnsaved(){
  document.getElementById('unsavedBadge').style.display='inline-block';
  document.getElementById('undoBtn').style.display='inline-block';
  document.getElementById('notice').classList.add('show');
  updateStats();
}

// ── JSON 다운로드 ──
function downloadJSON(){
  const finalWorks=WORKS.filter((_,i)=>!deleted.has(i));
  const newStats=STATS?{...STATS}:{};
  newStats.total=finalWorks.length;
  const str=JSON.stringify({works:finalWorks,stats:newStats},null,null);
  const blob=new Blob([str],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='kugak.json';a.click();
  URL.revokeObjectURL(url);
  toast(`다운로드 완료 (${finalWorks.length.toLocaleString()}개 작품)`);
  modified.clear();deleted.clear();added.clear();originals={};
  document.getElementById('unsavedBadge').style.display='none';
  document.getElementById('undoBtn').style.display='none';
  document.getElementById('notice').classList.remove('show');
  updateStats();
}

// ── 토스트 ──
let _tt;
function toast(msg){
  const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');
  clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),2400);
}

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

// 기본 정렬 표시
document.getElementById('th-d').querySelector('.sa').textContent='↑';

autoLoad();
</script>
