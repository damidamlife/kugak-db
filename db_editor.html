<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DB 편집기 · 한국 창작국악</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4f0;--surface:#fff;--border:#e5e4df;--border2:#d3d1c7;
  --text:#1a1a18;--muted:#888780;--hint:#b4b2a9;
  --blue:#185FA5;--blue-light:#e6f1fb;--blue-text:#0C447C;
  --teal:#1D9E75;--teal-light:#e1f5ee;--teal-text:#085041;
  --amber:#BA7517;--amber-light:#faeeda;--amber-text:#633806;
  --red:#A32D2D;--red-light:#fcebeb;--red-text:#791F1F;
  --gray:#f1efe8;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1a1a18;--surface:#2c2c2a;--border:#444441;--border2:#5f5e5a;
  --text:#e8e7e2;--muted:#888780;--hint:#5f5e5a;
  --blue:#378ADD;--blue-light:#0C447C;--blue-text:#B5D4F4;
  --teal:#1D9E75;--teal-light:#085041;--teal-text:#9FE1CB;
  --amber:#EF9F27;--amber-light:#633806;--amber-text:#FAC775;
  --red:#E24B4A;--red-light:#501313;--red-text:#F09595;
  --gray:#2c2c2a;
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;
  background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;min-height:100vh}

.header{background:var(--surface);border-bottom:1px solid var(--border);
  padding:13px 28px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:200}
.header h1{font-size:16px;font-weight:600}
.header p{font-size:12px;color:var(--muted);margin-top:1px}
.header-right{display:flex;gap:8px;align-items:center}

.btn{padding:7px 14px;border-radius:7px;font-size:13px;cursor:pointer;
  border:0.5px solid var(--border2);background:var(--surface);color:var(--text);
  font-family:inherit;transition:all .12s}
.btn:hover{background:var(--gray)}
.btn:disabled{opacity:.35;cursor:default}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-primary:hover:not(:disabled){background:#0C447C}
.btn-teal{background:var(--teal);color:#fff;border-color:var(--teal)}
.btn-teal:hover:not(:disabled){background:#085041}

/* 설정 패널 */
.setup-panel{background:var(--amber-light);border-bottom:1px solid rgba(186,117,23,.2);padding:14px 28px}
.setup-title{font-size:12px;font-weight:500;color:var(--amber-text);margin-bottom:10px}
.setup-row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
.setup-field{display:flex;flex-direction:column;gap:4px;flex:1;min-width:180px}
.setup-field label{font-size:11px;font-weight:500;color:var(--amber-text)}
.setup-field input{padding:7px 10px;font-size:13px;
  border:1px solid rgba(186,117,23,.3);border-radius:7px;
  background:var(--surface);color:var(--text);outline:none;font-family:inherit}
.setup-field input:focus{border-color:var(--amber)}
.setup-note{font-size:11px;color:var(--amber-text);margin-top:8px;opacity:.8}

/* 툴바 */
#app{display:none}
.toolbar{display:flex;gap:8px;padding:14px 28px;
  background:var(--surface);border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center}
.toolbar input,.toolbar select{padding:7px 10px;font-size:13px;
  border:0.5px solid var(--border2);border-radius:7px;
  background:var(--surface);color:var(--text);outline:none;font-family:inherit}
.toolbar input{flex:2;min-width:180px}
.toolbar input:focus{border-color:var(--blue)}
.toolbar select{flex:1;min-width:110px}
.search-btn{padding:7px 16px;background:var(--blue);color:#fff;
  border:none;border-radius:7px;font-size:13px;cursor:pointer;font-family:inherit}
.search-btn:hover{background:#0C447C}
.results-info{font-size:12px;color:var(--muted);white-space:nowrap}

/* 테이블 */
.table-wrap{overflow-x:auto;margin:0 28px 20px;
  border:0.5px solid var(--border);border-radius:10px;background:var(--surface)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--gray);padding:8px 12px;text-align:left;font-weight:500;
  font-size:11px;color:var(--muted);border-bottom:0.5px solid var(--border);white-space:nowrap}
td{padding:8px 12px;border-bottom:0.5px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--gray)}
.title-btn{background:none;border:none;cursor:pointer;font-size:13px;
  font-weight:500;color:var(--blue);text-align:left;padding:0;font-family:inherit}
.title-btn:hover{text-decoration:underline}
.badge{display:inline-block;padding:2px 7px;border-radius:5px;font-size:11px;font-weight:500}
.b-vocal{background:var(--teal-light);color:var(--teal-text)}
.b-instr{background:var(--blue-light);color:var(--blue-text)}
.b-drama{background:var(--amber-light);color:var(--amber-text)}
.b-etc{background:var(--gray);color:var(--muted)}
.cm-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--teal)}
.action-btns{display:flex;gap:4px}
.icon-btn{padding:3px 9px;border-radius:5px;font-size:11px;cursor:pointer;
  border:0.5px solid var(--border2);background:var(--surface);color:var(--muted)}
.icon-btn:hover{background:var(--gray)}
.icon-btn.del:hover{background:var(--red-light);color:var(--red-text)}

/* 로딩 인디케이터 */
.table-loading{text-align:center;padding:32px;color:var(--muted);font-size:13px}
.spinner-sm{display:inline-block;width:16px;height:16px;border:2px solid var(--border);
  border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;
  vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}

/* 페이지네이션 */
.pagination{display:flex;gap:8px;align-items:center;
  padding:0 28px 28px;justify-content:center}
.page-btn{padding:5px 14px;border:0.5px solid var(--border2);border-radius:7px;
  background:var(--surface);color:var(--text);cursor:pointer;font-size:12px}
.page-btn:disabled{opacity:.3;cursor:default}
.page-btn:not(:disabled):hover{background:var(--gray)}
.page-info{font-size:12px;color:var(--muted);min-width:80px;text-align:center}

/* 편집 모달 */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);
  z-index:500;overflow-y:auto;padding:32px 16px}
.modal-overlay.open{display:block}
.modal-inner{max-width:680px;margin:0 auto}
.modal{background:var(--surface);border-radius:14px;padding:28px}
.modal h2{font-size:16px;font-weight:600;margin-bottom:16px}
.modal-section{font-size:11px;font-weight:500;color:var(--muted);
  text-transform:uppercase;letter-spacing:.05em;
  margin:16px 0 10px;padding-bottom:6px;border-bottom:0.5px solid var(--border)}
.field-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.field{display:flex;flex-direction:column;gap:4px}
.field.full{grid-column:1/-1}
.field label{font-size:11px;font-weight:500;color:var(--muted);
  text-transform:uppercase;letter-spacing:.04em}
.field input,.field select,.field textarea{padding:8px 10px;font-size:13px;
  border:0.5px solid var(--border2);border-radius:7px;
  background:var(--surface);color:var(--text);outline:none;font-family:inherit}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--blue)}
.field textarea{resize:vertical;min-height:80px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;
  margin-top:20px;border-top:0.5px solid var(--border);padding-top:16px}

/* 저장 중 오버레이 */
.saving-overlay{position:fixed;inset:0;background:rgba(255,255,255,.5);
  z-index:800;display:none;align-items:center;justify-content:center}
.saving-overlay.show{display:flex}
.saving-box{background:var(--surface);border:0.5px solid var(--border);
  border-radius:10px;padding:18px 24px;display:flex;gap:12px;align-items:center}

/* 토스트 */
.toast{position:fixed;bottom:22px;right:22px;padding:10px 16px;
  border-radius:8px;font-size:13px;z-index:999;
  opacity:0;transform:translateY(6px);transition:all .18s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.toast-ok{background:#1a1a18;color:#f5f4f0}
.toast-err{background:var(--red);color:#fff}

@media(max-width:700px){
  .header,.toolbar,.table-wrap,.pagination{padding-left:14px;padding-right:14px}
  .field-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>DB 편집기</h1>
    <p>Datasette 실시간 편집 · 한국 창작국악 작품 DB</p>
  </div>
  <div class="header-right">
    <span id="connStatus" style="font-size:12px;color:var(--muted)">미연결</span>
    <button class="btn btn-teal" onclick="openAddModal()">+ 작품 추가</button>
    <a href="index.html" class="btn">← 메인으로</a>
  </div>
</div>

<!-- 연결 설정 -->
<div class="setup-panel">
  <div class="setup-title">Datasette 연결 설정</div>
  <div class="setup-row">
    <div class="setup-field">
      <label>Datasette URL</label>
      <input type="url" id="dsUrl" placeholder="https://kugak-db.onrender.com" oninput="saveSettings()">
    </div>
    <div class="setup-field" style="max-width:150px">
      <label>DB 이름</label>
      <input type="text" id="dsDb" value="kugak" oninput="saveSettings()">
    </div>
    <div class="setup-field" style="max-width:150px">
      <label>테이블 이름</label>
      <input type="text" id="dsTable" value="works" oninput="saveSettings()">
    </div>
    <button class="btn btn-primary" onclick="connect()">연결</button>
  </div>
  <div class="setup-note">URL 형식: https://앱이름.onrender.com (슬래시 없이) · 설정은 브라우저에 저장됩니다</div>
</div>

<div id="app">
  <div class="toolbar">
    <input type="text" id="q" placeholder="제목, 작곡가, 공연명 검색..." onkeydown="if(event.key==='Enter')search()">
    <select id="fGenre" onchange="search()">
      <option value="">전체 장르</option>
      <option value="기악">기악</option>
      <option value="성악">성악</option>
      <option value="극음악">극음악</option>
    </select>
    <select id="fCm" onchange="search()">
      <option value="">해설 전체</option>
      <option value="yes">해설 있음</option>
      <option value="no">해설 없음</option>
    </select>
    <button class="search-btn" onclick="search()">검색</button>
    <button class="btn" onclick="resetSearch()">초기화</button>
    <span class="results-info" id="resultsInfo"></span>
  </div>

  <div class="table-wrap">
    <table>
      <thead><tr>
        <th>제목</th>
        <th>장르</th>
        <th>형식</th>
        <th>작곡</th>
        <th>공연일</th>
        <th>해설</th>
        <th style="width:90px">작업</th>
      </tr></thead>
      <tbody id="tbody">
        <tr><td colspan="7" class="table-loading">연결 후 데이터가 표시됩니다</td></tr>
      </tbody>
    </table>
  </div>

  <div class="pagination">
    <button class="page-btn" id="prevBtn" onclick="changePage(-1)" disabled>← 이전</button>
    <span class="page-info" id="pageInfo">—</span>
    <button class="page-btn" id="nextBtn" onclick="changePage(1)" disabled>다음 →</button>
  </div>
</div>

<!-- 편집/추가 모달 -->
<div class="modal-overlay" id="modal" onclick="handleModalBg(event)">
  <div class="modal-inner">
    <div class="modal">
      <h2 id="modalTitle">작품 편집</h2>
      <input type="hidden" id="editId">

      <div class="modal-section">작품 정보</div>
      <div class="field-grid">
        <div class="field full"><label>제목 *</label><input id="f-title" placeholder="작품 제목"></div>
        <div class="field">
          <label>장르</label>
          <select id="f-genre">
            <option value="">선택</option>
            <option value="기악">기악</option>
            <option value="성악">성악</option>
            <option value="극음악">극음악</option>
          </select>
        </div>
        <div class="field"><label>형식</label><input id="f-form" placeholder="합주, 독주, 관현악..."></div>
        <div class="field"><label>악기·분류</label><input id="f-instrument" placeholder="가야금, 피리..."></div>
        <div class="field"><label>작곡</label><input id="f-composer" placeholder="작곡가명"></div>
        <div class="field"><label>편곡</label><input id="f-arrangement" placeholder="편곡자명"></div>
        <div class="field"><label>작사</label><input id="f-lyric" placeholder="작사자명"></div>
        <div class="field full"><label>구성</label><input id="f-structure" placeholder="악장 구성..."></div>
      </div>

      <div class="modal-section">공연 정보</div>
      <div class="field-grid">
        <div class="field"><label>공연일</label><input id="f-perf_date" placeholder="1995.10.15"></div>
        <div class="field"><label>공연 장소</label><input id="f-perf_place" placeholder="국립국악원 예악당"></div>
        <div class="field full"><label>공연명</label><input id="f-perf_name" placeholder="제00회 정기연주회..."></div>
        <div class="field full"><label>연주자</label><textarea id="f-perf_play" rows="2"></textarea></div>
      </div>

      <div class="modal-section">해설 · 비고</div>
      <div class="field-grid">
        <div class="field full"><label>작품 해설</label><textarea id="f-commentary" rows="4"></textarea></div>
        <div class="field full"><label>비고</label><textarea id="f-note" rows="2"></textarea></div>
        <div class="field full"><label>보충 해설 (note_02)</label><textarea id="f-note_02" rows="3"></textarea></div>
        <div class="field full"><label>추가 정보</label><textarea id="f-add_note" rows="2"></textarea></div>
      </div>

      <div class="modal-actions">
        <button class="btn" onclick="closeModal()">취소</button>
        <button class="btn btn-primary" onclick="saveWork()">저장</button>
      </div>
    </div>
  </div>
</div>

<div class="saving-overlay" id="savingOverlay">
  <div class="saving-box">
    <div class="spinner-sm" style="width:20px;height:20px;border-width:3px;display:inline-block"></div>
    <span id="savingMsg">저장 중...</span>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── 상태 ──
let DS_URL = '', DS_DB = 'kugak', DS_TABLE = 'works';
const PAGE = 50;
let currentOffset = 0;
let totalCount = 0;
let currentRows = [];
let lastQuery = {};

// ── 설정 저장/로드 ──
function saveSettings() {
  DS_URL   = document.getElementById('dsUrl').value.trim().replace(/\/$/, '');
  DS_DB    = document.getElementById('dsDb').value.trim() || 'kugak';
  DS_TABLE = document.getElementById('dsTable').value.trim() || 'works';
  localStorage.setItem('ds_url',   DS_URL);
  localStorage.setItem('ds_db',    DS_DB);
  localStorage.setItem('ds_table', DS_TABLE);
}

function loadSettings() {
  const u = localStorage.getItem('ds_url');
  const d = localStorage.getItem('ds_db');
  const t = localStorage.getItem('ds_table');
  if (u) { document.getElementById('dsUrl').value = u;   DS_URL   = u; }
  if (d) { document.getElementById('dsDb').value = d;    DS_DB    = d; }
  if (t) { document.getElementById('dsTable').value = t; DS_TABLE = t; }
}

// ── API 호출 ──
function apiBase()  { return `${DS_URL}/${DS_DB}/${DS_TABLE}`; }

async function apiFetch(url, opts = {}) {
  const isWrite = opts.method === 'POST';
  const headers = {};
  if (isWrite) headers['Content-Type'] = 'application/json';
  const res = await fetch(url, { ...opts, headers: { ...headers, ...(opts.headers||{}) } });
  if (!res.ok) {
    const txt = await res.text();
    throw new Error(`HTTP ${res.status} — ${txt.substring(0, 300)}`);
  }
  return res.json();
}

// ── 연결 ──
async function connect() {
  saveSettings();
  if (!DS_URL) { toast('Datasette URL을 입력하세요', true); return; }
  document.getElementById('connStatus').textContent = '연결 중...';
  try {
    // 전체 건수 확인
    const countUrl = `${DS_URL}/${DS_DB}.json`;
    await apiFetch(countUrl);   // 접속 가능 여부 확인
    document.getElementById('app').style.display = 'block';
    document.getElementById('connStatus').innerHTML = `<span style="color:var(--teal)">● 연결됨</span>`;
    search();
  } catch(e) {
    document.getElementById('connStatus').textContent = '연결 실패';
    toast('연결 실패: ' + e.message, true);
  }
}

// ── 검색 (서버 사이드) ──
function buildUrl(offset) {
  const q    = (document.getElementById('q').value || '').trim();
  const genre = document.getElementById('fGenre').value;
  const cm    = document.getElementById('fCm').value;

  const params = new URLSearchParams();
  params.set('_shape', 'array');
  params.set('_size', PAGE);
  params.set('_offset', offset);

  // Datasette 검색: _search 파라미터 (FTS5 인덱스 사용)
  if (q) params.set('_search', q);

  // 필터
  if (genre) params.set('genre', genre);
  if (cm === 'yes') params.set('commentary__isnotnull', '1');
  if (cm === 'no')  params.set('commentary__isnull', '1');

  return `${apiBase()}.json?${params.toString()}`;
}

async function search() {
  currentOffset = 0;
  await fetchPage(0);
}

async function fetchPage(offset) {
  setLoading(true);
  try {
    // 데이터 가져오기
    const rows = await apiFetch(buildUrl(offset));
    currentRows = rows;
    currentOffset = offset;

    // 전체 건수는 count URL로 별도 요청
    if (offset === 0) {
      const countRows = await apiFetch(buildUrl(0).replace(`_size=${PAGE}`, '_size=0'));
      // Datasette는 _size=0 이면 빈 배열 반환 — 대신 헤더나 별도 API 사용 불가
      // 총 건수를 정확히 알기 위해 SQL 쿼리 사용
      const q = (document.getElementById('q').value || '').trim();
      const genre = document.getElementById('fGenre').value;
      const cm = document.getElementById('fCm').value;
      let sql = `SELECT COUNT(*) as n FROM ${DS_TABLE} WHERE 1=1`;
      const sqlParams = new URLSearchParams();
      if (q) { sql += ` AND (title LIKE :q OR composer LIKE :q OR perf_name LIKE :q)`; sqlParams.set('q', `%${q}%`); }
      if (genre) { sql += ` AND genre = :genre`; sqlParams.set('genre', genre); }
      if (cm === 'yes') sql += ` AND commentary IS NOT NULL AND commentary != ''`;
      if (cm === 'no')  sql += ` AND (commentary IS NULL OR commentary = '')`;
      sqlParams.set('sql', sql);
      const cntRes = await apiFetch(`${DS_URL}/${DS_DB}.json?${sqlParams.toString()}&_shape=array`);
      totalCount = cntRes[0]?.n ?? rows.length;
    }

    renderTable(rows);
    updatePagination();
  } catch(e) {
    document.getElementById('tbody').innerHTML =
      `<tr><td colspan="7" style="text-align:center;padding:24px;color:var(--red-text)">오류: ${esc(e.message)}</td></tr>`;
    toast(e.message, true);
  } finally {
    setLoading(false);
  }
}

function resetSearch() {
  document.getElementById('q').value = '';
  document.getElementById('fGenre').value = '';
  document.getElementById('fCm').value = '';
  search();
}

// ── 테이블 렌더 ──
function renderTable(rows) {
  const tbody = document.getElementById('tbody');
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:24px;color:var(--muted)">검색 결과 없음</td></tr>';
    return;
  }
  tbody.innerHTML = rows.map(w => {
    const bc = w.genre==='성악'?'b-vocal':w.genre==='극음악'?'b-drama':w.genre==='기악'?'b-instr':'b-etc';
    return `<tr>
      <td><button class="title-btn" onclick='openEditModal(${JSON.stringify(w)})'>${esc(w.title)||'—'}</button></td>
      <td><span class="badge ${bc}">${esc(w.genre)||'—'}</span></td>
      <td style="color:var(--muted);white-space:nowrap">${esc(w.form)||'—'}</td>
      <td style="white-space:nowrap">${esc(w.composer)||'—'}</td>
      <td style="white-space:nowrap;color:var(--muted)">${esc(w.perf_date)||'—'}</td>
      <td>${w.commentary?`<span class="cm-dot" title="해설 있음"></span>`:''}</td>
      <td><div class="action-btns">
        <button class="icon-btn" onclick='openEditModal(${JSON.stringify(w)})'>수정</button>
        <button class="icon-btn del" onclick="deleteWork(${w.id},'${esc(w.title)}')">삭제</button>
      </div></td>
    </tr>`;
  }).join('');
}

function updatePagination() {
  const totalPages = Math.ceil(totalCount / PAGE) || 1;
  const curPage = Math.floor(currentOffset / PAGE) + 1;
  document.getElementById('pageInfo').textContent = `${curPage} / ${totalPages} (${totalCount.toLocaleString()}건)`;
  document.getElementById('resultsInfo').textContent = `${totalCount.toLocaleString()}개`;
  document.getElementById('prevBtn').disabled = currentOffset === 0;
  document.getElementById('nextBtn').disabled = currentOffset + PAGE >= totalCount;
}

async function changePage(dir) {
  const newOffset = currentOffset + dir * PAGE;
  if (newOffset < 0 || newOffset >= totalCount) return;
  await fetchPage(newOffset);
  document.querySelector('.table-wrap').scrollIntoView({ behavior: 'smooth' });
}

function setLoading(on) {
  if (on) {
    document.getElementById('tbody').innerHTML =
      '<tr><td colspan="7" class="table-loading"><span class="spinner-sm"></span>불러오는 중...</td></tr>';
  }
}

// ── 모달 ──
const FIELDS = ['title','genre','form','instrument','composer','arrangement',
  'lyric','structure','perf_date','perf_place','perf_name','perf_play',
  'commentary','note','note_02','add_note'];

function openAddModal() {
  document.getElementById('modalTitle').textContent = '작품 추가';
  document.getElementById('editId').value = '';
  FIELDS.forEach(f => { const el=document.getElementById('f-'+f); if(el) el.value=''; });
  document.getElementById('modal').classList.add('open');
}

function openEditModal(w) {
  if (typeof w === 'string') w = JSON.parse(w);
  document.getElementById('modalTitle').textContent = '작품 수정';
  document.getElementById('editId').value = w.id || '';
  FIELDS.forEach(f => { const el=document.getElementById('f-'+f); if(el) el.value=w[f]||''; });
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }
function handleModalBg(e) { if(e.target===document.getElementById('modal')) closeModal(); }
document.addEventListener('keydown', e => { if(e.key==='Escape') closeModal(); });

// ── 저장 ──
async function saveWork() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { toast('제목은 필수입니다', true); return; }

  const row = {};
  FIELDS.forEach(f => { const el=document.getElementById('f-'+f); if(el) row[f]=el.value.trim(); });

  const id = document.getElementById('editId').value;
  showSaving(id ? '수정 중...' : '추가 중...');

  try {
    if (id) {
      await apiFetch(`${apiBase()}/${id}/-/update`, {
        method: 'POST',
        body: JSON.stringify({ update: row })
      });
      toast('수정되었습니다');
    } else {
      await apiFetch(`${apiBase()}/-/insert`, {
        method: 'POST',
        body: JSON.stringify({ rows: [row] })
      });
      toast('추가되었습니다');
    }
    closeModal();
    await fetchPage(currentOffset);   // 현재 페이지 새로고침
  } catch(e) {
    toast('저장 실패: ' + e.message, true);
  } finally {
    hideSaving();
  }
}

// ── 삭제 ──
async function deleteWork(id, title) {
  if (!confirm(`"${title}"\n\n이 작품을 삭제하시겠습니까?`)) return;
  showSaving('삭제 중...');
  try {
    await apiFetch(`${apiBase()}/${id}/-/delete`, {
      method: 'POST',
      body: JSON.stringify({})
    });
    toast('삭제되었습니다');
    await fetchPage(currentOffset);
  } catch(e) {
    toast('삭제 실패: ' + e.message, true);
  } finally {
    hideSaving();
  }
}

// ── 유틸 ──
function showSaving(msg) { document.getElementById('savingMsg').textContent=msg; document.getElementById('savingOverlay').classList.add('show'); }
function hideSaving()    { document.getElementById('savingOverlay').classList.remove('show'); }

let _tt;
function toast(msg, err=false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + (err ? 'toast-err' : 'toast-ok');
  clearTimeout(_tt);
  _tt = setTimeout(() => el.classList.remove('show'), 3000);
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ── 초기화 ──
loadSettings();
</script>
