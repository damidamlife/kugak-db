<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DB 편집기 · 한국 창작국악</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4f0;--surface:#fff;--border:#e5e4df;--border2:#d3d1c7;
  --text:#1a1a18;--muted:#888780;--hint:#b4b2a9;
  --blue:#185FA5;--blue-light:#e6f1fb;--blue-text:#0C447C;
  --teal:#1D9E75;--teal-light:#e1f5ee;--teal-text:#085041;
  --amber:#BA7517;--amber-light:#faeeda;--amber-text:#633806;
  --red:#A32D2D;--red-light:#fcebeb;--red-text:#791F1F;
  --gray:#f1efe8;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1a1a18;--surface:#2c2c2a;--border:#444441;--border2:#5f5e5a;
  --text:#e8e7e2;--muted:#888780;--hint:#5f5e5a;
  --blue:#378ADD;--blue-light:#0C447C;--blue-text:#B5D4F4;
  --teal:#1D9E75;--teal-light:#085041;--teal-text:#9FE1CB;
  --amber:#EF9F27;--amber-light:#633806;--amber-text:#FAC775;
  --red:#E24B4A;--red-light:#501313;--red-text:#F09595;
  --gray:#2c2c2a;
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',sans-serif;
  background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;min-height:100vh}

/* ── 헤더 ── */
.header{background:var(--surface);border-bottom:1px solid var(--border);
  padding:13px 28px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:200}
.header h1{font-size:16px;font-weight:600}
.header p{font-size:12px;color:var(--muted);margin-top:1px}
.header-right{display:flex;gap:8px;align-items:center}
.btn{padding:7px 14px;border-radius:7px;font-size:13px;cursor:pointer;
  border:0.5px solid var(--border2);background:var(--surface);color:var(--text);
  font-family:inherit;transition:all .12s}
.btn:hover{background:var(--gray)}
.btn:disabled{opacity:.35;cursor:default}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-primary:hover:not(:disabled){background:#0C447C}
.btn-teal{background:var(--teal);color:#fff;border-color:var(--teal)}
.btn-teal:hover:not(:disabled){background:#085041}
.btn-danger{background:var(--red-light);color:var(--red-text);border-color:var(--red-light)}
.btn-danger:hover{background:#F09595;color:var(--red)}

/* ── 설정 패널 ── */
.setup-panel{background:var(--amber-light);border-bottom:1px solid rgba(186,117,23,.2);
  padding:14px 28px}
.setup-title{font-size:12px;font-weight:500;color:var(--amber-text);margin-bottom:10px}
.setup-row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
.setup-field{display:flex;flex-direction:column;gap:4px;flex:1;min-width:200px}
.setup-field label{font-size:11px;font-weight:500;color:var(--amber-text)}
.setup-field input{padding:7px 10px;font-size:13px;border:1px solid rgba(186,117,23,.3);
  border-radius:7px;background:var(--surface);color:var(--text);outline:none;font-family:inherit}
.setup-field input:focus{border-color:var(--amber)}
.setup-note{font-size:11px;color:var(--amber-text);margin-top:8px;opacity:.8}

/* ── 로딩 ── */
#loading{display:flex;flex-direction:column;align-items:center;
  justify-content:center;min-height:50vh;gap:12px;color:var(--muted)}
.spinner{width:28px;height:28px;border:3px solid var(--border);
  border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── 툴바 ── */
#app{display:none}
.toolbar{display:flex;gap:8px;padding:16px 28px;
  background:var(--surface);border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center}
.toolbar input{flex:2;min-width:180px;padding:7px 11px;font-size:13px;
  border:0.5px solid var(--border2);border-radius:7px;background:var(--surface);
  color:var(--text);outline:none}
.toolbar input:focus{border-color:var(--blue)}
.toolbar select{flex:1;min-width:110px;padding:7px 10px;font-size:13px;
  border:0.5px solid var(--border2);border-radius:7px;background:var(--surface);color:var(--text)}
.results-info{font-size:12px;color:var(--muted);margin-left:auto}

/* ── 테이블 ── */
.table-wrap{overflow-x:auto;margin:0 28px 28px;
  border:0.5px solid var(--border);border-radius:10px;background:var(--surface)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--gray);padding:8px 12px;text-align:left;font-weight:500;
  font-size:11px;color:var(--muted);border-bottom:0.5px solid var(--border);
  white-space:nowrap;cursor:pointer;user-select:none}
th:hover{background:var(--border)}
th .sa{font-size:9px;opacity:.35;margin-left:2px}
th.sorted .sa{opacity:1;color:var(--blue)}
td{padding:8px 12px;border-bottom:0.5px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--gray)}
.title-btn{background:none;border:none;cursor:pointer;font-size:13px;
  font-weight:500;color:var(--blue);text-align:left;padding:0;font-family:inherit}
.title-btn:hover{text-decoration:underline}
.badge{display:inline-block;padding:2px 7px;border-radius:5px;font-size:11px;font-weight:500}
.b-vocal{background:var(--teal-light);color:var(--teal-text)}
.b-instr{background:var(--blue-light);color:var(--blue-text)}
.b-drama{background:var(--amber-light);color:var(--amber-text)}
.b-etc{background:var(--gray);color:var(--muted)}
.cm-dot{display:inline-block;width:6px;height:6px;border-radius:50%;
  background:var(--teal);margin-left:4px;vertical-align:middle}
.action-btns{display:flex;gap:4px;white-space:nowrap}
.icon-btn{padding:3px 9px;border-radius:5px;font-size:11px;cursor:pointer;
  border:0.5px solid var(--border2);background:var(--surface);color:var(--muted);transition:all .1s}
.icon-btn:hover{background:var(--gray)}
.icon-btn.del:hover{background:var(--red-light);color:var(--red-text)}

/* ── 페이지네이션 ── */
.pagination{display:flex;gap:8px;align-items:center;padding:0 28px 28px;justify-content:center}
.page-btn{padding:5px 14px;border:0.5px solid var(--border2);border-radius:7px;
  background:var(--surface);color:var(--text);cursor:pointer;font-size:12px}
.page-btn:disabled{opacity:.3;cursor:default}
.page-btn:not(:disabled):hover{background:var(--gray)}
.page-info{font-size:12px;color:var(--muted);min-width:70px;text-align:center}

/* ── 편집 모달 ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);
  z-index:500;overflow-y:auto;padding:32px 16px}
.modal-overlay.open{display:block}
.modal-inner{max-width:680px;margin:0 auto}
.modal{background:var(--surface);border-radius:14px;padding:28px}
.modal h2{font-size:16px;font-weight:600;margin-bottom:18px}
.modal-section{font-size:11px;font-weight:500;color:var(--muted);
  text-transform:uppercase;letter-spacing:.05em;
  margin:16px 0 10px;padding-bottom:6px;border-bottom:0.5px solid var(--border)}
.field-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.field{display:flex;flex-direction:column;gap:4px}
.field.full{grid-column:1/-1}
.field label{font-size:11px;font-weight:500;color:var(--muted);
  text-transform:uppercase;letter-spacing:.04em}
.field input,.field select,.field textarea{padding:8px 10px;font-size:13px;
  border:0.5px solid var(--border2);border-radius:7px;
  background:var(--surface);color:var(--text);outline:none;font-family:inherit}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--blue)}
.field textarea{resize:vertical;min-height:80px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;
  margin-top:20px;border-top:0.5px solid var(--border);padding-top:16px}

/* ── 상태 표시 ── */
.toast{position:fixed;bottom:22px;right:22px;padding:10px 16px;
  border-radius:8px;font-size:13px;z-index:999;
  opacity:0;transform:translateY(6px);transition:all .18s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.toast-ok{background:#1a1a18;color:#f5f4f0}
.toast-err{background:var(--red);color:#fff}
.saving-overlay{position:fixed;inset:0;background:rgba(255,255,255,.6);
  z-index:800;display:none;align-items:center;justify-content:center}
.saving-overlay.show{display:flex}
.saving-box{background:var(--surface);border:0.5px solid var(--border);
  border-radius:10px;padding:20px 28px;display:flex;gap:12px;align-items:center;font-size:14px}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>DB 편집기</h1>
    <p>Datasette 실시간 편집 · 한국 창작국악 작품 DB</p>
  </div>
  <div class="header-right">
    <span id="connStatus" style="font-size:12px;color:var(--muted)">미연결</span>
    <button class="btn btn-teal" onclick="openAddModal()">+ 작품 추가</button>
    <a href="index.html" class="btn">← 메인으로</a>
  </div>
</div>

<!-- 연결 설정 -->
<div class="setup-panel" id="setupPanel">
  <div class="setup-title">Datasette 연결 설정</div>
  <div class="setup-row">
    <div class="setup-field">
      <label>Datasette URL</label>
      <input type="url" id="dsUrl" placeholder="https://kugak-db.onrender.com"
        value="" oninput="saveSettings()">
    </div>
    <div class="setup-field" style="max-width:160px">
      <label>DB 이름</label>
      <input type="text" id="dsDb" placeholder="kugak" value="kugak" oninput="saveSettings()">
    </div>
    <div class="setup-field" style="max-width:160px">
      <label>테이블 이름</label>
      <input type="text" id="dsTable" placeholder="works" value="works" oninput="saveSettings()">
    </div>
    <div class="setup-field">
      <label>API 토큰 (datasette-auth-passwords)</label>
      <input type="password" id="dsToken" placeholder="토큰 또는 비워두기"
        value="" oninput="saveSettings()">
    </div>
    <button class="btn btn-primary" onclick="connect()">연결</button>
  </div>
  <div class="setup-note">
    토큰은 Datasette에서 발급한 API 토큰입니다. datasette-auth-passwords를 사용 중이면 비밀번호 인증 방식이므로 비워두고 연결하세요.
    연결 설정은 브라우저에 저장됩니다.
  </div>
</div>

<div id="loading" style="display:none">
  <div class="spinner"></div>
  <span id="loadingMsg">데이터를 불러오는 중...</span>
</div>

<div id="app">
  <div class="toolbar">
    <input type="text" id="q" placeholder="제목, 작곡가, 공연명 검색..." oninput="doFilter()">
    <select id="fGenre" onchange="doFilter()">
      <option value="">전체 장르</option>
      <option value="기악">기악</option>
      <option value="성악">성악</option>
      <option value="극음악">극음악</option>
    </select>
    <select id="fForm" onchange="doFilter()"><option value="">전체 형식</option></select>
    <select id="fCm" onchange="doFilter()">
      <option value="">해설 전체</option>
      <option value="yes">해설 있음</option>
      <option value="no">해설 없음</option>
    </select>
    <span class="results-info" id="resultsInfo"></span>
  </div>

  <div class="table-wrap">
    <table>
      <thead><tr>
        <th onclick="sortBy('title')" id="th-title">제목 <span class="sa">↕</span></th>
        <th onclick="sortBy('genre')" id="th-genre">장르 <span class="sa">↕</span></th>
        <th onclick="sortBy('form')" id="th-form">형식 <span class="sa">↕</span></th>
        <th onclick="sortBy('composer')" id="th-composer">작곡 <span class="sa">↕</span></th>
        <th onclick="sortBy('perf_date')" id="th-perf_date" class="sorted">공연일 <span class="sa">↑</span></th>
        <th>해설</th>
        <th style="width:90px">작업</th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <div class="pagination">
    <button class="page-btn" id="prevBtn" onclick="changePage(-1)">← 이전</button>
    <span class="page-info" id="pageInfo"></span>
    <button class="page-btn" id="nextBtn" onclick="changePage(1)">다음 →</button>
  </div>
</div>

<!-- 편집/추가 모달 -->
<div class="modal-overlay" id="modal" onclick="handleModalBg(event)">
  <div class="modal-inner">
    <div class="modal">
      <h2 id="modalTitle">작품 편집</h2>
      <input type="hidden" id="editId">

      <div class="modal-section">작품 정보</div>
      <div class="field-grid">
        <div class="field full"><label>제목 *</label><input id="f-title" placeholder="작품 제목"></div>
        <div class="field">
          <label>장르</label>
          <select id="f-genre">
            <option value="">선택</option>
            <option value="기악">기악</option>
            <option value="성악">성악</option>
            <option value="극음악">극음악</option>
          </select>
        </div>
        <div class="field"><label>형식</label><input id="f-form" placeholder="합주, 독주, 관현악..."></div>
        <div class="field"><label>악기·분류</label><input id="f-instrument" placeholder="가야금, 피리..."></div>
        <div class="field"><label>작곡</label><input id="f-composer" placeholder="작곡가명"></div>
        <div class="field"><label>편곡</label><input id="f-arrangement" placeholder="편곡자명"></div>
        <div class="field"><label>작사</label><input id="f-lyric" placeholder="작사자명"></div>
        <div class="field full"><label>구성</label><input id="f-structure" placeholder="악장 구성..."></div>
      </div>

      <div class="modal-section">공연 정보</div>
      <div class="field-grid">
        <div class="field"><label>공연일</label><input id="f-perf_date" placeholder="1995.10.15"></div>
        <div class="field"><label>공연 장소</label><input id="f-perf_place" placeholder="국립국악원 예악당"></div>
        <div class="field full"><label>공연명</label><input id="f-perf_name" placeholder="제00회 정기연주회..."></div>
        <div class="field full"><label>연주자</label><textarea id="f-perf_play" rows="2" placeholder="악기:연주자, ..."></textarea></div>
      </div>

      <div class="modal-section">해설 · 비고</div>
      <div class="field-grid">
        <div class="field full"><label>작품 해설</label><textarea id="f-commentary" rows="4" placeholder="작품 해설 내용..."></textarea></div>
        <div class="field full"><label>비고</label><textarea id="f-note" rows="2" placeholder="비고..."></textarea></div>
        <div class="field full"><label>보충 해설 (note_02)</label><textarea id="f-note_02" rows="3" placeholder="보충 해설..."></textarea></div>
        <div class="field full"><label>추가 정보</label><textarea id="f-add_note" rows="2" placeholder="추가 정보..."></textarea></div>
      </div>

      <div class="modal-actions">
        <button class="btn" onclick="closeModal()">취소</button>
        <button class="btn btn-primary" onclick="saveWork()">저장</button>
      </div>
    </div>
  </div>
</div>

<!-- 저장 중 오버레이 -->
<div class="saving-overlay" id="savingOverlay">
  <div class="saving-box">
    <div class="spinner"></div>
    <span id="savingMsg">저장 중...</span>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── 설정 ──
let DS_URL = '', DS_DB = 'kugak', DS_TABLE = 'works', DS_TOKEN = '';
let ALL_WORKS = [], filtered = [], currentPage = 0;
const PAGE = 30;
let sortKey = 'perf_date', sortDir = 1;

function saveSettings() {
  DS_URL   = document.getElementById('dsUrl').value.replace(/\/$/, '');
  DS_DB    = document.getElementById('dsDb').value || 'kugak';
  DS_TABLE = document.getElementById('dsTable').value || 'works';
  DS_TOKEN = document.getElementById('dsToken').value;
  localStorage.setItem('ds_url',   DS_URL);
  localStorage.setItem('ds_db',    DS_DB);
  localStorage.setItem('ds_table', DS_TABLE);
}

function loadSettings() {
  const u = localStorage.getItem('ds_url');
  const d = localStorage.getItem('ds_db');
  const t = localStorage.getItem('ds_table');
  if (u) { document.getElementById('dsUrl').value = u; DS_URL = u; }
  if (d) { document.getElementById('dsDb').value = d; DS_DB = d; }
  if (t) { document.getElementById('dsTable').value = t; DS_TABLE = t; }
}

// ── Datasette API 헬퍼 ──
function apiBase()  { return `${DS_URL}/${DS_DB}/${DS_TABLE}`; }
function authHeader() {
  if (!DS_TOKEN) return {};
  return { 'Authorization': `Bearer ${DS_TOKEN}` };
}

async function apiFetch(url, opts = {}) {
  const isWrite = opts.method === 'POST';
  const res = await fetch(url, {
    ...opts,
    headers: {
      ...(isWrite ? { 'Content-Type': 'application/json' } : {}),
      ...authHeader(),
      ...(opts.headers || {})
    }
  });
  if (!res.ok) {
    const txt = await res.text();
    throw new Error(`HTTP ${res.status}: ${txt.substring(0,200)}`);
  }
  return res.json();
}

// ── 연결 · 데이터 로드 ──
async function connect() {
  if (!DS_URL) { toast('Datasette URL을 입력하세요', true); return; }
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('loadingMsg').textContent = '데이터를 불러오는 중...';
  document.getElementById('app').style.display = 'none';

  try {
    // 전체 데이터 로드 (최대 10만 행)
    let works = [], offset = 0;
    while (true) {
      const url = `${apiBase()}.json?_shape=array&_size=1000&_offset=${offset}`;
      const chunk = await apiFetch(url);
      works = works.concat(chunk);
      if (chunk.length < 1000) break;
      offset += 1000;
      document.getElementById('loadingMsg').textContent = `${works.length.toLocaleString()}개 로드 중...`;
    }

    ALL_WORKS = works;

    // 형식 셀렉트 채우기
    const formSet = [...new Set(works.map(w => w.form).filter(Boolean))].sort();
    const sel = document.getElementById('fForm');
    sel.innerHTML = '<option value="">전체 형식</option>';
    formSet.forEach(f => { const o=document.createElement('option'); o.value=f; o.textContent=f; sel.appendChild(o); });

    document.getElementById('connStatus').innerHTML =
      `<span style="color:var(--teal)">● 연결됨</span> · ${works.length.toLocaleString()}개`;
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    doFilter();
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('connStatus').textContent = '연결 실패';
    toast('연결 실패: ' + e.message, true);
  }
}

// ── 필터 · 정렬 ──
function doFilter() {
  const q  = (document.getElementById('q').value||'').toLowerCase();
  const g  = document.getElementById('fGenre').value;
  const f  = document.getElementById('fForm').value;
  const cm = document.getElementById('fCm').value;

  filtered = ALL_WORKS.filter(w => {
    if (g && w.genre !== g) return false;
    if (f && !(w.form||'').includes(f)) return false;
    if (cm === 'yes' && !w.commentary) return false;
    if (cm === 'no'  &&  w.commentary) return false;
    if (q) {
      const hay = (w.title+w.composer+w.perf_name+(w.commentary||'')).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  filtered.sort((a, b) => {
    let va = a[sortKey]||'', vb = b[sortKey]||'';
    if (sortKey === 'perf_date') {
      va = va.replace(/\D/g,'').padEnd(8,'0');
      vb = vb.replace(/\D/g,'').padEnd(8,'0');
      return va < vb ? -sortDir : va > vb ? sortDir : 0;
    }
    return va.localeCompare(vb, 'ko') * sortDir;
  });

  currentPage = 0;
  renderTable();
}

function sortBy(key) {
  if (sortKey === key) sortDir *= -1; else { sortKey = key; sortDir = 1; }
  document.querySelectorAll('th[id^="th-"]').forEach(th => {
    th.classList.remove('sorted');
    th.querySelector('.sa').textContent = '↕';
  });
  const th = document.getElementById('th-'+key);
  if (th) { th.classList.add('sorted'); th.querySelector('.sa').textContent = sortDir===1?'↑':'↓'; }
  doFilter();
}

// ── 테이블 렌더 ──
function renderTable() {
  const total = filtered.length;
  const start = currentPage * PAGE;
  const page  = filtered.slice(start, start + PAGE);
  document.getElementById('resultsInfo').textContent = `${total.toLocaleString()}개`;

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  if (!page.length) {
    tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:24px;color:var(--muted)">결과 없음</td></tr>';
  } else {
    page.forEach(w => {
      const bc = w.genre==='성악'?'b-vocal':w.genre==='극음악'?'b-drama':w.genre==='기악'?'b-instr':'b-etc';
      tbody.innerHTML += `<tr>
        <td><button class="title-btn" onclick="openEditModal(${w.id})">${esc(w.title)||'—'}</button></td>
        <td><span class="badge ${bc}">${esc(w.genre)||'—'}</span></td>
        <td style="color:var(--muted);white-space:nowrap">${esc(w.form)||'—'}</td>
        <td style="white-space:nowrap">${esc(w.composer)||'—'}</td>
        <td style="white-space:nowrap;color:var(--muted)">${esc(w.perf_date)||'—'}</td>
        <td>${w.commentary?'<span class="cm-dot" title="해설 있음"></span>':'<span style="color:var(--hint);font-size:11px">없음</span>'}</td>
        <td><div class="action-btns">
          <button class="icon-btn" onclick="openEditModal(${w.id})">수정</button>
          <button class="icon-btn del" onclick="deleteWork(${w.id}, '${esc(w.title)}')">삭제</button>
        </div></td>
      </tr>`;
    });
  }

  const tp = Math.ceil(total/PAGE)||1;
  document.getElementById('pageInfo').textContent = `${currentPage+1} / ${tp}`;
  document.getElementById('prevBtn').disabled = currentPage===0;
  document.getElementById('nextBtn').disabled = currentPage>=tp-1;
}

function changePage(d) {
  const tp = Math.ceil(filtered.length/PAGE)||1;
  currentPage = Math.max(0, Math.min(tp-1, currentPage+d));
  renderTable();
  document.querySelector('.table-wrap').scrollIntoView({behavior:'smooth'});
}

// ── 모달 ──
const FIELDS = ['title','genre','form','instrument','composer','arrangement',
  'lyric','structure','perf_date','perf_place','perf_name','perf_play',
  'commentary','note','note_02','add_note'];

function openAddModal() {
  document.getElementById('modalTitle').textContent = '작품 추가';
  document.getElementById('editId').value = '';
  FIELDS.forEach(f => {
    const el = document.getElementById('f-'+f);
    if (el) el.value = '';
  });
  document.getElementById('modal').classList.add('open');
}

function openEditModal(id) {
  const w = ALL_WORKS.find(x => x.id === id);
  if (!w) return;
  document.getElementById('modalTitle').textContent = '작품 수정';
  document.getElementById('editId').value = id;
  FIELDS.forEach(f => {
    const el = document.getElementById('f-'+f);
    if (el) el.value = w[f] || '';
  });
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}
function handleModalBg(e) {
  if (e.target === document.getElementById('modal')) closeModal();
}
document.addEventListener('keydown', e => { if (e.key==='Escape') closeModal(); });

// ── 저장 (추가 or 수정) ──
async function saveWork() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { toast('제목은 필수입니다', true); return; }

  const row = {};
  FIELDS.forEach(f => {
    const el = document.getElementById('f-'+f);
    if (el) row[f] = el.value.trim();
  });

  const id = document.getElementById('editId').value;
  showSaving(id ? '수정 중...' : '추가 중...');

  try {
    if (id) {
      // 수정: PATCH /{db}/{table}/{id}/-/update
      await apiFetch(`${apiBase()}/${id}/-/update`, {
        method: 'POST',
        body: JSON.stringify({ update: row })
      });
      const idx = ALL_WORKS.findIndex(w => w.id === parseInt(id));
      if (idx >= 0) ALL_WORKS[idx] = { ...ALL_WORKS[idx], ...row };
      toast('수정되었습니다');
    } else {
      // 추가: POST /{db}/{table}/-/insert
      const result = await apiFetch(`${apiBase()}/-/insert`, {
        method: 'POST',
        body: JSON.stringify({ rows: [row] })
      });
      const newId = result.rows ? result.rows[0]?.id : result.inserted_pk;
      ALL_WORKS.unshift({ id: newId, ...row });
      document.getElementById('connStatus').innerHTML =
        `<span style="color:var(--teal)">● 연결됨</span> · ${ALL_WORKS.length.toLocaleString()}개`;
      toast('추가되었습니다');
    }
    closeModal();
    doFilter();
  } catch(e) {
    toast('저장 실패: ' + e.message, true);
  } finally {
    hideSaving();
  }
}

// ── 삭제 ──
async function deleteWork(id, title) {
  if (!confirm(`"${title}"\n\n이 작품을 삭제하시겠습니까?\n삭제 후 되돌릴 수 없습니다.`)) return;
  showSaving('삭제 중...');
  try {
    await apiFetch(`${apiBase()}/${id}/-/delete`, { method: 'POST', body: JSON.stringify({}) });
    ALL_WORKS = ALL_WORKS.filter(w => w.id !== id);
    document.getElementById('connStatus').innerHTML =
      `<span style="color:var(--teal)">● 연결됨</span> · ${ALL_WORKS.length.toLocaleString()}개`;
    doFilter();
    toast('삭제되었습니다');
  } catch(e) {
    toast('삭제 실패: ' + e.message, true);
  } finally {
    hideSaving();
  }
}

// ── UI 유틸 ──
function showSaving(msg) { document.getElementById('savingMsg').textContent=msg; document.getElementById('savingOverlay').classList.add('show'); }
function hideSaving()    { document.getElementById('savingOverlay').classList.remove('show'); }

let _tt;
function toast(msg, err=false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + (err?'toast-err':'toast-ok');
  clearTimeout(_tt);
  _tt = setTimeout(() => el.classList.remove('show'), 3000);
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── 초기화 ──
loadSettings();
if (DS_URL) connect();
</script>
