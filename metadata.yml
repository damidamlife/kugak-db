# metadata.yml
# Datasette 사이트 설정 파일

title: 한국 창작국악 작품 데이터베이스
description: 1940–2018년 국악 창작 작품 아카이브
license: Creative Commons Attribution
source: 한국 창작국악 DB

# 데이터베이스 설명
databases:
  kugak:
    description: 국악 창작 작품 전체 데이터

    # 테이블별 설명 및 컬럼 레이블
    tables:
      works:
        description: 국악 창작 작품 목록
        label_column: title         # 행 대표 이름으로 사용할 컬럼
        searchmode: raw             # 한국어 전문 검색 활성화
        facets:
          - genre                   # 왼쪽 패널에 필터로 표시할 컬럼들
          - form
          - composer

        # 컬럼 한글 레이블
        columns:
          title: 제목
          genre: 장르
          form: 형식
          instrument: 악기·분류
          composer: 작곡
          arrangement: 편곡
          lyric: 작사
          structure: 구성
          perf_date: 공연일
          perf_name: 공연명
          perf_place: 공연 장소
          perf_play: 연주자
          note: 비고
          commentary: 작품 해설
          add_note: 추가 정보
          note_02: 보충 해설

# ── 편집 권한 설정 (datasette-write 플러그인) ──────────────
# 아래 비밀번호 해시는 반드시 직접 생성해야 합니다.
# 터미널에서: datasette hash-password 입력 후 원하는 비밀번호 입력
# 생성된 해시를 아래 password_hash 값으로 교체하세요.

permissions:
  execute-sql:
    id: "*"                   # 누구나 SQL 실행 가능 (읽기 전용)

plugins:
  datasette-auth-passwords:
    htpasswd_users:
      admin:                  # 관리자 계정 이름
        # 아래 해시를 실제 비밀번호 해시로 교체하세요
        # 임시값 — 배포 전 반드시 변경!
        password_hash: "pbkdf2_sha256$260000$placeholder$replacethiswithreal"
