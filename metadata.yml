# metadata.yml
# Datasette 설정 — CORS·편집 권한 완전 설정

title: 한국 창작국악 작품 데이터베이스
description: 1940–2018년 국악 창작 작품 아카이브

databases:
  kugak:
    description: 국악 창작 작품 전체 데이터
    tables:
      works:
        description: 국악 창작 작품 목록
        label_column: title
        searchmode: raw
        facets:
          - genre
          - form
          - composer

        # 컬럼 한글 레이블
        columns:
          title: 제목
          genre: 장르
          form: 형식
          instrument: 악기·분류
          composer: 작곡
          arrangement: 편곡
          lyric: 작사
          structure: 구성
          perf_date: 공연일
          perf_name: 공연명
          perf_place: 공연 장소
          perf_play: 연주자
          note: 비고
          commentary: 작품 해설
          add_note: 추가 정보
          note_02: 보충 해설

# ── 권한 설정 ──────────────────────────────────────────────
# "*" = 누구나 (인증 없이) 가능
# "admin" = admin 계정만 가능
#
# 현재: 읽기는 누구나, 쓰기는 admin 계정만 가능
# 편집기를 내부용으로만 쓴다면 insert/update/delete도 "*"로 바꿔도 됩니다

permissions:
  # 누구나 읽기 가능
  view-instance:
    id: "*"
  view-database:
    id: "*"
  view-table:
    id: "*"
  execute-sql:
    id: "*"

  # 쓰기 권한 — admin 계정만 허용
  # 공개 편집이 필요하면 "*" 로 변경
  insert-row:
    id: "admin"
  update-row:
    id: "admin"
  delete-row:
    id: "admin"

# ── 인증 설정 (datasette-auth-passwords) ──────────────────
# 비밀번호 해시 생성 방법:
#   pip install datasette datasette-auth-passwords
#   datasette hash-password
#   → 원하는 비밀번호 입력 → 출력된 해시를 아래에 붙여넣기
#
# 주의: 아래 placeholder를 반드시 실제 해시로 교체하세요!

plugins:
  datasette-auth-passwords:
    htpasswd_users:
      admin:
        password_hash: "pbkdf2_sha256$480000$4e6c9f4b86c6d2a7f9b48df4634f6255$TXeoCx0sa6Eqz5NTzIk6MxVYyM3vqGktWF6YORGplGg="
